name: ChessMate Tests

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']

    services:
      redis:
        image: redis:6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_chessmate
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install System Dependencies
      timeout-minutes: 5
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libpq-dev python3-dev
        # Skip stockfish installation in CI - tests can mock it or use fallback
        # Stockfish (~34MB) can timeout in resource-constrained CI environments
        # Create a mock stockfish binary to satisfy tests expecting it at /usr/games/stockfish
        sudo mkdir -p /usr/games
        echo '#!/bin/bash' | sudo tee /usr/games/stockfish > /dev/null
        echo 'echo "id name Stockfish 16"' | sudo tee -a /usr/games/stockfish > /dev/null
        echo 'echo "id author Stockfish"' | sudo tee -a /usr/games/stockfish > /dev/null
        echo 'while read line; do echo "$line"; done' | sudo tee -a /usr/games/stockfish > /dev/null
        sudo chmod +x /usr/games/stockfish
        echo "✓ Mock Stockfish created at /usr/games/stockfish"

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-django pytest-cov pytest-mock fakeredis

    - name: Set up Environment
      run: |
        echo "TESTING=True" >> .env
        echo "DEBUG=True" >> .env
        echo "SECRET_KEY=test-secret-key" >> .env
        echo "DB_NAME=test_chessmate" >> .env
        echo "DB_USER=postgres" >> .env
        echo "DB_PASSWORD=postgres" >> .env
        echo "DB_HOST=localhost" >> .env
        echo "DB_PORT=5432" >> .env
        echo "REDIS_HOST=localhost" >> .env
        echo "REDIS_PORT=6379" >> .env
        echo "STOCKFISH_PATH=/usr/games/stockfish" >> .env

    - name: Run Standalone Tests
      env:
        PYTEST_ADDOPTS: --disable-warnings
      run: |
        python run_tests.py --standalone --coverage --fail-under 0

    - name: Run Django Tests
      env:
        PYTEST_ADDOPTS: --disable-warnings
      run: |
        python run_tests.py --django --coverage --fail-under 0

    - name: Generate Combined Coverage Report
      env:
        PYTEST_ADDOPTS: --disable-warnings
      run: |
        python run_tests.py --coverage --html --fail-under 0

    - name: Normalize Coverage Artifacts
      run: |
        if [ -d chess_mate/htmlcov ]; then
          rm -rf htmlcov
          cp -r chess_mate/htmlcov htmlcov
        fi

        if [ -f chess_mate/coverage.xml ]; then
          cp chess_mate/coverage.xml coverage.xml
        fi

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report-python${{ matrix.python-version }}
        path: htmlcov/

    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./coverage.xml
        token: ${{ secrets['CODECOV_TOKEN'] }}
        flags: backend,python${{ matrix.python-version }}
        fail_ci_if_error: false
        verbose: true

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'chess_mate/frontend/package-lock.json'

    - name: Install Dependencies
      working-directory: chess_mate/frontend
      run: npm ci

    - name: Run Tests
      working-directory: chess_mate/frontend
      run: npm test -- --watchAll=false --coverage

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report-frontend
        path: chess_mate/frontend/coverage/

    - name: Upload Coverage to Codecov
      if: ${{ env.CODECOV_TOKEN != '' }}
      uses: codecov/codecov-action@v6
      with:
        files: ./chess_mate/frontend/coverage/coverage-final.json
        token: ${{ env.CODECOV_TOKEN }}
        flags: frontend
        fail_ci_if_error: false

    - name: Skip Frontend Codecov Upload (missing token)
      if: ${{ env.CODECOV_TOKEN == '' }}
      run: echo "CODECOV_TOKEN is not configured; skipping frontend coverage upload."

  linting:
    name: Code Quality & Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'chess_mate/frontend/package-lock.json'

    - name: Install Backend Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 isort black mypy bandit safety pylint pylint-django flake8-django

    - name: Install Frontend Linting Tools
      working-directory: chess_mate/frontend
      run: npm ci

    - name: Check Python Code Style (flake8)
      run: |
        flake8 chess_mate/ --count --select=E9,F63,F7,F82,F401,F841,E722,E711,E712,E713,E714 --max-line-length=120 --show-source --statistics

    - name: Check Python Imports (isort)
      run: |
        isort --check-only --profile black chess_mate/

    - name: Check Python Formatting (black)
      run: |
        black --check --line-length=120 chess_mate/

    - name: Check Python Type Hints (mypy)
      run: |
        mypy chess_mate/ --ignore-missing-imports

    - name: Run Python Security Scan (bandit)
      run: |
        bandit -r chess_mate/ -x "chess_mate/tests/,chess_mate/*/tests/"

    - name: Check Python Dependencies for Vulnerabilities
      run: |
        safety check -r requirements.txt --full-report

    - name: Run Django Specific Linting (pylint-django)
      run: |
        pylint --load-plugins=pylint_django --django-settings-module=chess_mate.settings chess_mate/core/ --disable=C0111,C0103,C0303,W0613,R0903,W0511,R0913,C0330,C0326,R0201,R0902,R0914,W0212,C0301,R0904,W0221,E1101

    - name: Check Frontend Code Style (eslint)
      working-directory: chess_mate/frontend
      run: npm run lint

    - name: Check Frontend Code Format (prettier)
      working-directory: chess_mate/frontend
      run: npm run format:check || true # Don't fail CI for formatting issues

    - name: Check Frontend Dependencies for Vulnerabilities
      working-directory: chess_mate/frontend
      run: npm audit --production || true # Don't fail CI on audit (report only)

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-tests, frontend-tests]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Run Docker Security Scan
      run: |
        docker run --rm \
          -v "${{ github.workspace }}:/workdir" \
          aquasec/trivy:0.65.0 \
          fs \
          --format table \
          --output /workdir/trivy-report.txt \
          --exit-code 0 \
          --severity CRITICAL,HIGH \
          --ignore-unfixed \
          /workdir

        echo "Trivy scan completed in report-only mode."
        tail -n 60 trivy-report.txt || true

    - name: Upload Trivy Report
      uses: actions/upload-artifact@v7
      with:
        name: trivy-security-report
        path: trivy-report.txt

    - name: Run Repository Security Scan
      env:
        SNYK_TOKEN: ${{ secrets['SNYK_TOKEN'] }}
      run: |
        if [ -z "$SNYK_TOKEN" ]; then
          echo "SNYK_TOKEN is not configured; skipping repository scan."
          exit 0
        fi
        npm install -g snyk
        snyk auth "$SNYK_TOKEN"
        snyk test --severity-threshold=high --all-projects

  health-check:
    name: Health Check Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-tests, frontend-tests]
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up Environment
      run: |
        echo "TESTING=True" >> .env
        echo "DEBUG=True" >> .env
        echo "SECRET_KEY=test-secret-key" >> .env

    - name: Start Server in Background
      run: |
        cd chess_mate
        nohup python manage.py runserver 0.0.0.0:8000 > /tmp/chessmate-server.log 2>&1 &
        for i in {1..20}; do
          if curl -fsS http://localhost:8000/health/ >/dev/null; then
            echo "Server is ready"
            exit 0
          fi
          sleep 2
        done
        echo "Server failed to start in time"
        tail -n 200 /tmp/chessmate-server.log || true
        exit 1

    - name: Test Health Check Endpoint
      run: |
        curl -f http://localhost:8000/health/ || exit 1
        echo "Health check passed"
