name: Security Scan

on:
  schedule:
    - cron: '0 0 * * 0'  # Run weekly on Sunday at midnight
  workflow_dispatch:  # Allow manual triggering

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ZAP_TARGET_URL: ${{ vars.ZAP_TARGET_URL || secrets.ZAP_TARGET_URL || '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r chess_mate/requirements.txt
          pip install safety bandit

      - name: Check Python dependencies for security vulnerabilities
        run: |
          safety check -r chess_mate/requirements.txt

      - name: Run Bandit security linter
        run: |
          bandit -r chess_mate/ -x chess_mate/core/tests/,chess_mate/*/migrations/

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'chess_mate/frontend/package-lock.json'

      - name: Install Node.js dependencies
        working-directory: chess_mate/frontend
        run: npm ci

      - name: Run npm audit
        working-directory: chess_mate/frontend
        run: npm audit

      - name: Validate ZAP Target
        id: zap_target
        run: |
          if [ -z "$ZAP_TARGET_URL" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "ZAP_TARGET_URL is not configured; skipping ZAP baseline scan."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Using ZAP target: $ZAP_TARGET_URL"
          fi

      - name: Run OWASP ZAP Baseline Scan
        if: ${{ steps.zap_target.outputs.configured == 'true' }}
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ env.ZAP_TARGET_URL }}
          allow_issue_writing: false
          cmd_options: '-a'

      - name: Skip OWASP ZAP Baseline Scan (missing target)
        if: ${{ steps.zap_target.outputs.configured != 'true' }}
        run: echo "Skipping OWASP ZAP baseline scan because ZAP_TARGET_URL is not configured."
