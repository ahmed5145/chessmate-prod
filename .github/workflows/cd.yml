name: ChessMate CD

on:
  push:
    branches: [ main, staging ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

concurrency:
  group: deploy-${{ github.event.inputs.environment || github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
      HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL || secrets.HEALTHCHECK_URL || '' }}

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r chess_mate/requirements.txt
        cd chess_mate/frontend
        npm ci

    - name: Build frontend
      run: |
        cd chess_mate/frontend
        npm run build

    - name: Collect static files
      env:
        DJANGO_SETTINGS_MODULE: chess_mate.settings
      run: |
        cd chess_mate
        python manage.py collectstatic --noinput

    - name: Run migrations
      run: |
        cd chess_mate
        python manage.py migrate --noinput

    - name: Package application
      run: |
        zip -r chessmate-app.zip \
          chess_mate/ \
          chess_mate/frontend/build/ \
          requirements.txt \
          README.md

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION || vars.AWS_REGION || 'us-east-1' }}

    - name: Deploy to Elastic Beanstalk
      if: ${{ github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main' }}
      uses: einaregilsson/beanstalk-deploy@v21
      with:
        aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        application_name: chessmate
        environment_name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'ChessMate-Production' || 'ChessMate-Staging') }}
        version_label: chessmate-${{ github.run_number }}-${{ github.sha }}
        region: ${{ secrets.AWS_REGION || vars.AWS_REGION || 'us-east-1' }}
        deployment_package: chessmate-app.zip

    - name: Deploy to Staging Server
      if: ${{ github.event.inputs.environment == 'staging' || github.ref == 'refs/heads/staging' }}
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USERNAME }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: ${{ secrets.STAGING_PORT }}
        script: |
          mkdir -p ~/deployments/chessmate-${{ github.run_number }}
          cd ~/deployments/chessmate-${{ github.run_number }}

          # Pull the latest code
          git clone https://github.com/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

          # Setup virtual environment
          python -m venv venv
          source venv/bin/activate
          pip install -r chess_mate/requirements.txt

          # Environment variables should be provided by server secrets/config
          echo "Using pre-configured environment on server"

          # Build frontend
          cd chess_mate/frontend
          npm ci
          npm run build
          cd ..

          # Collect static files and run migrations
          cd chess_mate
          python manage.py collectstatic --noinput
          python manage.py migrate --noinput

          # Restart services
          sudo systemctl restart chessmate-gunicorn
          sudo systemctl restart chessmate-celery-worker

          # Update symbolic link to current deployment
          cd ~/
          ln -sfn ~/deployments/chessmate-${{ github.run_number }} chessmate-current

    - name: Post-deployment checks
      run: |
        echo "Deployment completed for environment: $DEPLOY_ENV"
        echo "Running post-deployment checks..."
        if [ -z "$HEALTHCHECK_URL" ]; then
          echo "HEALTHCHECK_URL is not configured; skipping health check."
          exit 0
        fi

        for i in {1..10}; do
          if curl -fsS "$HEALTHCHECK_URL" >/dev/null; then
            echo "Post-deployment health check passed"
            exit 0
          fi
          echo "Health check attempt $i failed; retrying in 10s..."
          sleep 10
        done

        echo "Post-deployment health check failed after retries"
        exit 1
