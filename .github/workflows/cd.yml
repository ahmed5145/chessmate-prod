name: ChessMate CD

on:
  push:
    branches: [ main, staging ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

concurrency:
  group: deploy-${{ github.event.inputs.environment || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
      EB_ENV_NAME: ${{ (github.event.inputs.environment == 'production' || (github.event.inputs.environment == '' && github.ref == 'refs/heads/main')) && 'Chessmate-env-2' || 'ChessMate-Staging' }}
      HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL || secrets.HEALTHCHECK_URL || '' }}

    steps:
    - uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'chess_mate/frontend/package-lock.json'

    - name: Install Frontend Dependencies
      working-directory: chess_mate/frontend
      run: npm install

    - name: Build frontend
      working-directory: chess_mate/frontend
      env:
        # Empty = same-origin /api/v1/... (never set to /api — doubles the path)
        REACT_APP_API_URL: ''
      run: npm run build

    - name: Prune frontend dependencies from deploy bundle
      run: |
        rm -rf chess_mate/frontend/node_modules
        rm -rf node_modules

    - name: Verify frontend build artifact
      run: |
        test -f chess_mate/frontend/build/index.html
        echo "Frontend build OK: chess_mate/frontend/build/index.html"

    - name: Evaluate Deployment Preconditions
      id: deploy_precheck
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION || '' }}
      run: |
        aws_ready=true

        if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
          aws_ready=false
        fi

        if [ -z "$AWS_REGION" ]; then
          aws_ready=false
        fi

        echo "aws_ready=$aws_ready" >> "$GITHUB_OUTPUT"
        echo "AWS deploy prerequisites: $aws_ready"
        echo "Target EB environment: $EB_ENV_NAME ($DEPLOY_ENV)"

    - name: Configure AWS credentials
      if: steps.deploy_precheck.outputs.aws_ready == 'true'
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION || vars.AWS_REGION || 'us-east-2' }}

    - name: Login to Amazon ECR
      if: steps.deploy_precheck.outputs.aws_ready == 'true'
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Ensure ECR repository exists
      if: steps.deploy_precheck.outputs.aws_ready == 'true'
      run: |
        aws ecr describe-repositories --repository-names chessmate 2>/dev/null || \
        aws ecr create-repository --repository-name chessmate

    - name: Build and push Docker image to ECR
      if: steps.deploy_precheck.outputs.aws_ready == 'true'
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: chessmate-${{ env.DEPLOY_ENV }}-${{ github.run_number }}-${{ github.sha }}
      run: |
        docker build -t "$ECR_REGISTRY/chessmate:$IMAGE_TAG" .
        docker push "$ECR_REGISTRY/chessmate:$IMAGE_TAG"
        echo "IMAGE_URI=$ECR_REGISTRY/chessmate:$IMAGE_TAG" >> "$GITHUB_ENV"

    - name: Package Elastic Beanstalk deployment bundle (ECR image)
      if: steps.deploy_precheck.outputs.aws_ready == 'true'
      run: |
        cat > Dockerrun.aws.json <<EOF
        {
          "AWSEBDockerrunVersion": "1",
          "Image": {
            "Name": "${IMAGE_URI}",
            "Update": "true"
          },
          "Ports": [
            {
              "ContainerPort": 8000
            }
          ]
        }
        EOF
        cat Dockerrun.aws.json
        zip -r chessmate-app.zip Dockerrun.aws.json .ebextensions/

    - name: Deploy to Elastic Beanstalk
      if: steps.deploy_precheck.outputs.aws_ready == 'true'
      uses: einaregilsson/beanstalk-deploy@v23
      with:
        aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        application_name: chessmate
        environment_name: ${{ env.EB_ENV_NAME }}
        version_label: chessmate-${{ env.DEPLOY_ENV }}-${{ github.run_number }}-${{ github.sha }}
        region: ${{ secrets.AWS_REGION || vars.AWS_REGION || 'us-east-2' }}
        deployment_package: chessmate-app.zip
        use_existing_version_if_available: true
        wait_for_environment_recovery: true
        max_backoff_retries: 18

    - name: Skip Deploy (Missing AWS Credentials)
      if: steps.deploy_precheck.outputs.aws_ready != 'true'
      run: |
        echo "Skipping $DEPLOY_ENV deployment: required AWS credentials/region are not configured."

    - name: Post-deployment checks
      env:
        REQUIRE_HEALTHCHECK: ${{ 'true' }}
      run: |
        echo "Deployment completed for environment: $DEPLOY_ENV ($EB_ENV_NAME)"
        echo "Running post-deployment checks..."

        if [ -z "$HEALTHCHECK_URL" ]; then
          if [ "$REQUIRE_HEALTHCHECK" = "true" ]; then
            echo "ERROR: HEALTHCHECK_URL must be set for staging/production deploys."
            echo "Set it to https://<host>/readiness/ in the GitHub Environment variables."
            exit 1
          fi
          echo "HEALTHCHECK_URL is not configured; skipping health check."
          exit 0
        fi

        BASE_URL="${HEALTHCHECK_URL%/readiness/}"
        BASE_URL="${BASE_URL%/}"
        LIVENESS_URL="${BASE_URL}/health/"
        READINESS_URL="${BASE_URL}/readiness/"

        echo "Waiting 90s for container startup (migrations, collectstatic)..."
        sleep 90

        for i in {1..15}; do
          if curl -fsS "$LIVENESS_URL" >/dev/null; then
            echo "Liveness check passed: $LIVENESS_URL"
            if curl -fsS "$READINESS_URL" >/dev/null; then
              echo "Readiness check passed: $READINESS_URL"
            else
              echo "WARNING: readiness returned non-200 (app up but DB may be slow): $READINESS_URL"
            fi
            exit 0
          fi
          echo "Health check attempt $i failed; retrying in 15s..."
          sleep 15
        done

        echo "Post-deployment health check failed after retries: $LIVENESS_URL"
        exit 1
