name: ChessMate CD

on:
  push:
    branches: [ main, staging ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

concurrency:
  group: deploy-${{ github.event.inputs.environment || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
      HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL || secrets.HEALTHCHECK_URL || '' }}

    steps:
    - uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'chess_mate/frontend/package-lock.json'

    - name: Install Frontend Dependencies
      working-directory: chess_mate/frontend
      run: npm install

    - name: Build frontend
      working-directory: chess_mate/frontend
      run: npm run build

    - name: Prune frontend dependencies from deploy bundle
      run: |
        rm -rf chess_mate/frontend/node_modules
        rm -rf node_modules

    - name: Verify frontend build artifact
      run: |
        test -f chess_mate/frontend/build/index.html
        echo "Frontend build OK: chess_mate/frontend/build/index.html"

    - name: Evaluate Deployment Preconditions
      id: deploy_precheck
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ secrets.AWS_REGION || vars.AWS_REGION || '' }}
        STAGING_HOST: ${{ secrets.STAGING_HOST }}
        STAGING_USERNAME: ${{ secrets.STAGING_USERNAME }}
        STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        STAGING_PORT: ${{ secrets.STAGING_PORT }}
      run: |
        aws_ready=true
        staging_ready=true

        if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
          aws_ready=false
        fi

        if [ -z "$AWS_REGION" ]; then
          aws_ready=false
        fi

        if [ -z "$STAGING_HOST" ] || [ -z "$STAGING_USERNAME" ] || [ -z "$STAGING_SSH_KEY" ] || [ -z "$STAGING_PORT" ]; then
          staging_ready=false
        fi

        echo "aws_ready=$aws_ready" >> "$GITHUB_OUTPUT"
        echo "staging_ready=$staging_ready" >> "$GITHUB_OUTPUT"

        echo "AWS deploy prerequisites: $aws_ready"
        echo "Staging deploy prerequisites: $staging_ready"

    - name: Configure AWS credentials
      if: ${{ (github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main') && steps.deploy_precheck.outputs.aws_ready == 'true' }}
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION || vars.AWS_REGION || 'us-east-2' }}

    - name: Login to Amazon ECR
      if: ${{ (github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main') && steps.deploy_precheck.outputs.aws_ready == 'true' }}
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Ensure ECR repository exists
      if: ${{ (github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main') && steps.deploy_precheck.outputs.aws_ready == 'true' }}
      run: |
        aws ecr describe-repositories --repository-names chessmate 2>/dev/null || \
        aws ecr create-repository --repository-name chessmate

    - name: Build and push Docker image to ECR
      if: ${{ (github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main') && steps.deploy_precheck.outputs.aws_ready == 'true' }}
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: chessmate-${{ github.run_number }}-${{ github.sha }}
      run: |
        docker build -t "$ECR_REGISTRY/chessmate:$IMAGE_TAG" .
        docker push "$ECR_REGISTRY/chessmate:$IMAGE_TAG"
        echo "IMAGE_URI=$ECR_REGISTRY/chessmate:$IMAGE_TAG" >> "$GITHUB_ENV"

    - name: Package Elastic Beanstalk deployment bundle (ECR image)
      if: ${{ (github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main') && steps.deploy_precheck.outputs.aws_ready == 'true' }}
      run: |
        cat > Dockerrun.aws.json <<EOF
        {
          "AWSEBDockerrunVersion": "1",
          "Image": {
            "Name": "${IMAGE_URI}",
            "Update": "true"
          },
          "Ports": [
            {
              "ContainerPort": 8000
            }
          ]
        }
        EOF
        cat Dockerrun.aws.json
        zip -r chessmate-app.zip Dockerrun.aws.json .ebextensions/

    - name: Deploy to Elastic Beanstalk
      if: ${{ (github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main') && steps.deploy_precheck.outputs.aws_ready == 'true' }}
      uses: einaregilsson/beanstalk-deploy@v22
      with:
        aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        application_name: chessmate
        environment_name: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'Chessmate-env-2' || 'ChessMate-Staging') }}
        version_label: chessmate-${{ github.run_number }}-${{ github.sha }}
        region: ${{ secrets.AWS_REGION || vars.AWS_REGION || 'us-east-2' }}
        deployment_package: chessmate-app.zip
        use_existing_version_if_available: true
        wait_for_environment_recovery: true
        max_backoff_retries: 18

    - name: Skip Production Deploy (Missing AWS Credentials)
      if: ${{ (github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main') && steps.deploy_precheck.outputs.aws_ready != 'true' }}
      run: |
        echo "Skipping production deployment: required AWS credentials/region are not configured."

    - name: Deploy to Staging Server
      if: ${{ (github.event.inputs.environment == 'staging' || github.ref == 'refs/heads/staging') && steps.deploy_precheck.outputs.staging_ready == 'true' }}
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USERNAME }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: ${{ secrets.STAGING_PORT }}
        script: |
          mkdir -p ~/deployments/chessmate-${{ github.run_number }}
          cd ~/deployments/chessmate-${{ github.run_number }}

          # Pull the latest code
          git clone https://github.com/${{ github.repository }}.git .
          git checkout ${{ github.sha }}

          # Setup virtual environment
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

          # Environment variables should be provided by server secrets/config
          echo "Using pre-configured environment on server"

          # Build frontend
          cd chess_mate/frontend
          npm install
          npm run build

          # Collect static files and run migrations (from chess_mate directory)
          cd ../
          python manage.py collectstatic --noinput
          python manage.py migrate --noinput

          # Restart services
          sudo systemctl restart chessmate-gunicorn
          sudo systemctl restart chessmate-celery-worker

          # Update symbolic link to current deployment
          cd ~/
          ln -sfn ~/deployments/chessmate-${{ github.run_number }} chessmate-current

    - name: Skip Staging Deploy (Missing SSH Credentials)
      if: ${{ (github.event.inputs.environment == 'staging' || github.ref == 'refs/heads/staging') && steps.deploy_precheck.outputs.staging_ready != 'true' }}
      run: |
        echo "Skipping staging deployment: required staging SSH secrets are not configured."

    - name: Post-deployment checks
      env:
        REQUIRE_HEALTHCHECK: ${{ (github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging' || github.ref == 'refs/heads/staging') && 'true' || 'false' }}
      run: |
        echo "Deployment completed for environment: $DEPLOY_ENV"
        echo "Running post-deployment checks..."

        if [ -z "$HEALTHCHECK_URL" ]; then
          if [ "$REQUIRE_HEALTHCHECK" = "true" ]; then
            echo "ERROR: HEALTHCHECK_URL must be set for staging/production deploys."
            echo "Set it to https://<host>/readiness/ in the GitHub Environment variables."
            exit 1
          fi
          echo "HEALTHCHECK_URL is not configured; skipping health check (non-staging/production)."
          exit 0
        fi

        for i in {1..10}; do
          if curl -fsS "$HEALTHCHECK_URL" >/dev/null; then
            echo "Post-deployment health check passed: $HEALTHCHECK_URL"
            exit 0
          fi
          echo "Health check attempt $i failed; retrying in 10s..."
          sleep 10
        done

        echo "Post-deployment health check failed after retries: $HEALTHCHECK_URL"
        exit 1
