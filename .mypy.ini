[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
disallow_untyped_decorators = False
no_implicit_optional = True
strict_optional = True
explicit_package_bases = True
namespace_packages = True
exclude = (^chess_mate[\\/]__init__.py$)|(^chess_mate[\\/]chess_mate[\\/]settings_dev.py$)|(^chess_mate[\\/]chess_mate[\\/]test_settings.py$)|(^chess_mate[\\/]current_models.py$)|(^chess_mate[\\/]current_schema.py$)|(^chess_mate[\\/](core|telemetry|scripts)[\\/])

[mypy.plugins.django-stubs]
django_settings_module = "chess_mate.settings"

[mypy-django.*]
ignore_missing_imports = True

[mypy-rest_framework.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-celery.*]
ignore_missing_imports = True

[mypy-channels.*]
ignore_missing_imports = True

[mypy-chess_mate.core.djangostubs]
ignore_errors = True

[mypy-chess_mate.core.cache]
disable_error_code = no-any-return
